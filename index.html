<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>A Little Late... But Made For You 💙</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- SKY -->
    <div id="sky">

        <div class="moon"></div>

        <div class="cloud cloud1"></div>
        <div class="cloud cloud2"></div>
        <div class="cloud cloud3"></div>

    </div>

    <!-- COVER -->
    <section id="cover">

        <div class="card">

            <p class="small-title">
                FOR MICAH PINEDA
            </p>

            <h1>
                A Little Late...
            </h1>

            <h2>
                But Made For You 💙
            </h2>

            <button id="openBook">
                📖 Open Your Story
            </button>

        </div>

    </section>

    <!-- STORY -->
    <section id="story">

        <div class="book">

            <p class="chapter-number"></p>

            <h1 class="chapter-title"></h1>

            <div id="storyText"></div>

            <button id="nextPage">
                Turn the Page →
            </button>

            <p id="pageNumber"></p>

        </div>

    </section>

    <!-- ENDING SCREEN -->
    <div id="ending">

        <div class="ending-content">

            <p id="endingText"></p>

            <button id="lookUpButton">
                🌤 Look Up
            </button>

        </div>

    </div>

    <!-- FINAL SKY -->
    <div id="finalSky">

        <div class="final-message">

            <p id="verse">
                "The heavens declare the glory of God;
                the skies proclaim the work of His hands."
            </p>

            <p id="reference">
                — Psalm 19:1
            </p>

            <h2>
                To God be the glory.
            </h2>

        </div>

    </div>

    <!-- JavaScript -->
    <script src="app.js"></script>

</body>

</html>
